<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>CRICLOUNGE — PakistanTeam</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

<style>
:root {
  --bg: #0a0f0b; 
  --surf: rgba(18, 26, 20, 0.75); 
  --surf2: rgba(26, 38, 29, 0.5); 
  --bdr: rgba(45, 66, 51, 0.6);
  --acc: #1a8c35; 
  --acc2: #d42b2b; 
  --txt: #e6f0e8; 
  --muted: #8ba391;
  --font-main: 'Poppins', sans-serif;
  --glass-blur: blur(12px) saturate(160%);
  --glass-border: 1px solid rgba(255, 255, 255, 0.08);
  --liquid-glass: rgba(255, 255, 255, 0.12);
  --glass-stroke: 1px solid rgba(255, 255, 255, 0.2);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  background-image: 
    radial-gradient(circle at 50% -10%, #1a3a22 0%, transparent 40%),
    radial-gradient(circle at 0% 100%, #0d1a0f 0%, transparent 30%);
  color: var(--txt);
  font-family: var(--font-main);
  font-weight: 700;
  min-height: 100vh;
  overflow-x: hidden;
}

header {
  background: var(--surf);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: var(--glass-border);
  padding: 15px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky; top: 0; z-index: 100;
}

.brand { font-size: 22px; letter-spacing: 2px; }
.brand span { color: var(--acc); text-shadow: 0 0 15px rgba(26, 140, 53, 0.4); }

.wrap { max-width: 1440px; margin: 20px auto; padding: 0 20px; }
.live-layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }

.player-card, .channels-section {
  background: var(--surf);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: var(--glass-border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
  position: relative;
}

.video-wrap {
  width: 100%; 
  aspect-ratio: 16/9; 
  background: #000;
  position: relative; 
  display: flex; 
  align-items: center; 
  justify-content: center;
}

.seek-overlay {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2147483647;
  background: rgba(0, 0, 0, 0.5);
  padding: 20px;
  border-radius: 50%;
  width: 100px; height: 100px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.seek-overlay.active { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
.seek-text { font-size: 14px; color: #fff; margin-top: 5px; }

.clappr-stretch video { object-fit: fill !important; }
.clappr-zoom video { object-fit: cover !important; }
.clappr-padded video { transform: scale(0.9); }

#shaka-video { object-fit: contain; width: 100%; height: 100%; }
.shaka-stretch { object-fit: fill !important; }
.shaka-zoom { object-fit: cover !important; }

.controls-overlay { 
  position: absolute; 
  top: 15px; right: 15px;
  z-index: 2147483647; 
  display: flex; gap: 8px;
  transition: opacity 0.4s ease, visibility 0.4s;
}

.progress-container {
  position: absolute;
  bottom: 12px; 
  left: 12px;
  right: 12px;
  width: calc(100% - 24px); 
  height: 42px; 
  background: var(--liquid-glass);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: var(--glass-border);
  border-radius: 12px;
  z-index: 2147483647;
  transition: opacity 0.4s ease, visibility 0.4s;
  cursor: pointer;
  display: flex;
  align-items: center;
  padding: 0 12px;
}

.progress-track {
  flex-grow: 1;
  height: 6px;
  background: rgba(255, 255, 255, 0.1);
  position: relative;
  transition: height 0.1s;
  border-radius: 10px;
  overflow: hidden;
}

.progress-container:hover .progress-track { height: 8px; }

.buffer-bar {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  background: rgba(255, 255, 255, 0.25);
  width: 0%;
  transition: width 0.3s linear;
  pointer-events: none;
}

.play-bar {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  background: var(--acc);
  width: 0%;
  box-shadow: 0 0 10px var(--acc);
  pointer-events: none;
}

.time-display {
  font-size: 11px;
  color: #fff;
  margin-right: 10px;
  white-space: nowrap;
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  pointer-events: none;
}

.live-btn {
  background: var(--liquid-glass);
  backdrop-filter: blur(15px) saturate(180%);
  -webkit-backdrop-filter: blur(15px) saturate(180%);
  color: #fff;
  border: var(--glass-stroke);
  box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
  border-radius: 6px;
  padding: 4px 10px;
  margin-left: 12px;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-main);
  text-transform: uppercase;
  transition: all 0.2s;
}

.live-btn:hover {
  background: var(--acc);
  border-color: var(--acc);
  box-shadow: 0 4px 15px rgba(26, 140, 53, 0.3);
}

.live-btn:active { transform: scale(0.95); }

.controls-overlay select, .fs-btn {
  background: var(--liquid-glass);
  backdrop-filter: blur(15px) saturate(180%);
  -webkit-backdrop-filter: blur(15px) saturate(180%);
  color: #fff;
  border: var(--glass-stroke);
  box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
  font-family: var(--font-main);
  font-size: 11px; font-weight: 700;
  padding: 6px 12px; border-radius: 6px;
  cursor: pointer; outline: none; text-transform: uppercase;
  appearance: none; -webkit-appearance: none;
}

.mid-pause-btn {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2147483646;
  background: var(--liquid-glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: var(--glass-stroke);
  width: 70px; height: 70px;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.4s ease, visibility 0.4s, transform 0.2s;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), inset 0 0 15px rgba(255, 255, 255, 0.1);
}

.mid-pause-btn svg { width: 30px; height: 30px; fill: white; }
.ui-hidden { opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }

.buffering-spinner {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2147483645;
  width: 50px; height: 50px;
  border: 5px solid rgba(255, 255, 255, 0.1);
  border-top-color: var(--acc);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  display: none;
}

@keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

#pad-regulator, #aspect-regulator, #quality-regulator { display: none; }
@media (orientation: landscape) { #pad-regulator, #aspect-regulator, #quality-regulator { display: block; } }
:fullscreen #pad-regulator, :fullscreen #aspect-regulator, :fullscreen #quality-regulator { display: block; }

.player-infobar { padding: 24px; background: rgba(0,0,0,0.25); }
#current-ch-name { font-size: 24px; margin-bottom: 4px; color: var(--txt); }
.ch-meta { font-size: 11px; color: var(--acc); letter-spacing: 2px; opacity: 0.8; text-transform: uppercase; }

.ch-list-head { padding: 12px 20px; background: var(--surf2); border-bottom: var(--glass-border); font-size: 12px; }

.category-filter {
  display: flex;
  gap: 8px;
  padding: 12px 15px;
  background: rgba(0,0,0,0.15);
  overflow-x: auto;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.category-filter::-webkit-scrollbar { display: none; }
.cat-btn {
  background: var(--liquid-glass);
  border: var(--glass-border);
  color: var(--muted);
  padding: 6px 14px;
  border-radius: 30px;
  font-size: 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.3s;
  font-family: var(--font-main);
  font-weight: 700;
}
.cat-btn.active {
  background: var(--acc);
  color: #fff;
  border-color: var(--acc);
  box-shadow: 0 4px 15px rgba(26, 140, 53, 0.3);
}

.ch-list { overflow-y: auto; max-height: 480px; }
.ch-list::-webkit-scrollbar { width: 4px; }
.ch-list::-webkit-scrollbar-thumb { background: var(--acc); border-radius: 10px; }
.ch-row { display: flex; align-items: center; gap: 15px; padding: 10px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); cursor: pointer; transition: all 0.3s ease; border-right: 5px solid transparent; }
.ch-row:hover { background: rgba(255, 255, 255, 0.05); }
.ch-row.active { background: linear-gradient(-90deg, rgba(26, 140, 53, 0.25) 0%, transparent 100%); border-right: 5px solid var(--acc); }
.ch-row-art { width: 60px; height: 40px; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 4px; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ch-row-art img { width: 100%; height: 100%; object-fit: contain; }

.ch-tags { display: flex; gap: 6px; margin-top: 6px; }
.tag {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--muted);
  font-size: 8px;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
}
.active .tag { color: var(--txt); border-color: rgba(26, 140, 53, 0.5); }

/* Custom Choice Modal */
.choice-modal {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999999;
}
.choice-card {
  background: var(--surf);
  border: var(--glass-border);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.choice-btns { display: flex; gap: 15px; margin-top: 25px; justify-content: center; }
.btn-opt {
  padding: 12px 20px;
  border-radius: 8px;
  border: none;
  font-family: var(--font-main);
  font-weight: 700;
  cursor: pointer;
  text-transform: uppercase;
  font-size: 12px;
  transition: transform 0.2s;
}
.btn-app { background: var(--acc); color: white; }
.btn-web { background: var(--liquid-glass); color: white; border: var(--glass-stroke); }
.btn-opt:active { transform: scale(0.95); }

@media(max-width:1024px) { .live-layout { grid-template-columns: 1fr; } }
</style>
</head>

</div>

{ id: 9, mode: "app", category: "Indian Premier League", name: "Sky Sports NZ 1", url: "http://line.hmajtx.top:80/play/live.php?mac=00:1A:79:A3:BE:B0&stream=1905864&extension=m3u8", logo: "https://images.channel5.eu/eGqxKQFYBvdaZ1gtJTHXn44tRBP25APwLvpWnRekeFDMIk8y3rFZMLR46PSmy78xpMboxuYPtedLmMDg1-YpBg.png", quality: "1080P", fps: "50 FPS", vpn: "Worldwide" },
{ id: 9, mode: "app", category: "Indian Premier League", name: "Star Sports 1 Hindi", url: "http://line.hmajtx.top:80/play/live.php?mac=00:1A:79:A3:BE:B0&stream=1905864&extension=m3u8", logo: "https://eapi.pcloud.com/getpubthumb?code=XZMjuKZSLY5pAb156JNHp6kvutm1kAiTHmk&linkpassword=&size=800x450&crop=0&type=auto", quality: "1080P", fps: "25 FPS", vpn: "Worldwide" }
  ];

  let clapprPlayer, shakaInstance, shakaVideo, uiTimer, hlsInstance;
  let activeCategory = "All";
  let activeChannelIndex = 0;
  let touchStartX = 0;
  let touchEndX = 0;

  function formatTime(seconds) {
    if (!seconds || isNaN(seconds) || !isFinite(seconds)) return "0:00";
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = Math.floor(seconds % 60);
    return (h > 0 ? h + ":" + (m < 10 ? "0" : "") : "") + m + ":" + (s < 10 ? "0" : "") + s;
  }

  function togglePlayPause() {
    const isGeneric = document.getElementById('shaka-container').style.display !== 'none';
    if (isGeneric) shakaVideo.paused ? shakaVideo.play() : shakaVideo.pause();
    else clapprPlayer.isPlaying() ? clapprPlayer.pause() : clapprPlayer.play();
    updatePauseIcons();
    resetTimer();
  }

  function updatePauseIcons() {
    const isGeneric = document.getElementById('shaka-container').style.display !== 'none';
    const isPaused = isGeneric ? shakaVideo.paused : !clapprPlayer.isPlaying();
    document.getElementById('play-icon').style.display = isPaused ? 'block' : 'none';
    document.getElementById('pause-icon').style.display = isPaused ? 'none' : 'block';
  }

  function updateProgress() {
    const isGeneric = document.getElementById('shaka-container').style.display !== 'none';
    const playLine = document.getElementById('play-line');
    const bufferLine = document.getElementById('buffer-line');
    const timeDisplay = document.getElementById('time-data');
    let duration, currentTime, bufferEnd = 0;

    if (isGeneric) {
      currentTime = shakaVideo.currentTime;
      duration = shakaVideo.duration;
      if (shakaInstance && !hlsInstance) {
          const seekRange = shakaInstance.seekRange();
          duration = seekRange.end;
          const bufferedInfo = shakaInstance.getBufferedInfo();
          if (bufferedInfo && bufferedInfo.total.length > 0) bufferEnd = bufferedInfo.total[bufferedInfo.total.length - 1].end;
      } else if (shakaVideo.buffered.length > 0) {
          bufferEnd = shakaVideo.buffered.end(shakaVideo.buffered.length - 1);
      }
    } else {
      duration = clapprPlayer.getDuration();
      currentTime = clapprPlayer.getCurrentTime();
      bufferEnd = (clapprPlayer.getBufferedPercentage() / 100) * duration;
    }
    
    if (duration > 0 && isFinite(duration)) {
      playLine.style.width = (currentTime / duration * 100) + "%";
      bufferLine.style.width = (bufferEnd / duration * 100) + "%";
      timeDisplay.innerText = formatTime(currentTime) + " / " + formatTime(duration);
    } else {
      playLine.style.width = "100%";
      bufferLine.style.width = "100%";
      timeDisplay.innerText = "LIVE";
    }
  }

  async function toggleFullscreen() {
    const container = document.getElementById('v-container');
    if (!document.fullscreenElement) {
      if (container.requestFullscreen) await container.requestFullscreen();
      if (screen.orientation?.lock) await screen.orientation.lock('landscape').catch(()=>{});
    } else document.exitFullscreen();
  }

  function goToLive(event) {
    if (event) event.stopPropagation();
    const isGeneric = document.getElementById('shaka-container').style.display !== 'none';
    if (isGeneric) {
      if (hlsInstance) shakaVideo.currentTime = shakaVideo.duration;
      else if (shakaInstance) shakaVideo.currentTime = shakaInstance.seekRange().end;
    } else clapprPlayer.seek(clapprPlayer.getDuration());
    resetTimer();
  }

  function resetTimer() {
    const overlay = document.getElementById('custom-controls');
    const midBtn = document.getElementById('mid-pause-btn');
    const playBar = document.getElementById('playback-bar');
    overlay.classList.remove('ui-hidden');
    midBtn.classList.remove('ui-hidden');
    playBar.classList.remove('ui-hidden');
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => {
      if (document.activeElement.tagName !== 'SELECT') {
        overlay.classList.add('ui-hidden');
        midBtn.classList.add('ui-hidden');
        playBar.classList.add('ui-hidden');
      }
    }, 3000);
  }

  function handleSwipe() {
    const diff = touchEndX - touchStartX;
    const threshold = 50; 
    if (Math.abs(diff) > threshold) {
      executeSeek(diff > 0 ? 10 : -10);
    }
  }

  function executeSeek(seconds) {
    const isGeneric = document.getElementById('shaka-container').style.display !== 'none';
    const overlay = document.getElementById('seek-feedback');
    const icon = document.getElementById('seek-icon');
    const valText = document.getElementById('seek-val');

    if (isGeneric) shakaVideo.currentTime += seconds;
    else clapprPlayer.seek(clapprPlayer.getCurrentTime() + seconds);

    valText.innerText = (seconds > 0 ? "+" : "") + seconds + "s";
    icon.innerHTML = seconds > 0 
        ? '<path d="M4 12l8 8V4L4 12zm11-8v16l8-8-8-8z"/>' 
        : '<path d="M20 12l-8-8v16l8-8zM9 4v16l-8-8 8-8z"/>';
    
    overlay.classList.add('active');
    setTimeout(() => overlay.classList.remove('active'), 600);
    resetTimer();
  }

  async function initPlayer() {
    clapprPlayer = new Clappr.Player({
      parentId: "#clappr-player-container",
      source: "",
      width: '100%',
      height: '100%',
      autoPlay: true,
      chromeless: true,
      playback: {
        hlsjsConfig: { enableLowLatencyMode: true, initialLiveManifestSize: 1, liveSyncDurationCount: 2, maxBufferLength: 30, maxMaxBufferLength: 60 }
      },
      events: {
        onPlay: () => { document.getElementById('buffering-ui').style.display = 'none'; updatePauseIcons(); resetTimer(); },
        onPause: () => { updatePauseIcons(); resetTimer(); },
        onBuffer: () => document.getElementById('buffering-ui').style.display = 'block',
        onBufferFull: () => document.getElementById('buffering-ui').style.display = 'none'
      }
    });

    shakaVideo = document.getElementById('shaka-video');
    shakaInstance = new shaka.Player(shakaVideo);
    shakaInstance.configure({ streaming: { bufferingGoal: 30, rebufferingGoal: 0.5, bufferBehind: 30, lowLatencyMode: true } });
    shakaVideo.addEventListener('timeupdate', updateProgress);
    setInterval(updateProgress, 500);

    const spinner = document.getElementById('buffering-ui');
    shakaVideo.onwaiting = () => spinner.style.display = 'block';
    shakaVideo.onplaying = () => { spinner.style.display = 'none'; updatePauseIcons(); resetTimer(); };
    
    const container = document.getElementById('v-container');
    container.addEventListener('click', () => resetTimer());
    container.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
    container.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, {passive: true});

    document.getElementById('playback-bar').addEventListener('click', (e) => {
      e.stopPropagation();
      const isGeneric = document.getElementById('shaka-container').style.display !== 'none';
      const rect = e.currentTarget.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      if (isGeneric) {
        let dur = shakaVideo.duration;
        if (shakaInstance && !hlsInstance) dur = shakaInstance.seekRange().end;
        if (dur > 0 && isFinite(dur)) shakaVideo.currentTime = pos * dur;
      } else {
        const dur = clapprPlayer.getDuration();
        if (dur > 0) clapprPlayer.seek(pos * dur);
      }
      updateProgress();
      resetTimer();
    });
    
    renderChannels();
    await selectChannel(0);

    document.getElementById('aspect-regulator').addEventListener('change', (e) => {
      const val = e.target.value;
      const clapprCont = document.getElementById('clappr-player-container');
      shakaVideo.classList.remove('shaka-stretch', 'shaka-zoom');
      clapprCont.classList.remove('clappr-stretch', 'clappr-zoom');
      if(val === 'stretch') { shakaVideo.classList.add('shaka-stretch'); clapprCont.classList.add('clappr-stretch'); }
      if(val === 'zoom') { shakaVideo.classList.add('shaka-zoom'); clapprCont.classList.add('clappr-zoom'); }
      resetTimer();
    });

    document.getElementById('quality-regulator').addEventListener('change', (e) => {
      const val = e.target.value;
      if (document.getElementById('shaka-container').style.display !== 'none') {
        if (hlsInstance) {
            if (val === 'auto') hlsInstance.currentLevel = -1;
            else hlsInstance.currentLevel = parseInt(val);
        } else {
            if (val === 'auto') shakaInstance.configure({ abr: { enabled: true } });
            else {
                shakaInstance.configure({ abr: { enabled: false } });
                const tracks = shakaInstance.getVariantTracks().sort((a,b) => b.height - a.height);
                shakaInstance.selectVariantTrack(tracks[val], true);
            }
        }
      } else {
        if (val !== 'auto') clapprPlayer.configure({ level: parseInt(val) });
      }
      resetTimer();
    });
  }

  function filterCategory(cat) {
    activeCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.classList.toggle('active', btn.innerText === (cat === 'Pakistan Super League' ? 'PSL' : cat === 'Indian Premier League' ? 'IPL' : 'ALL'));
    });
    renderChannels();
  }

  async function selectChannel(index) {
    const ch = CHANNELS[index];
    
    if (ch.mode === "redirect") {
        window.open(ch.url, '_blank');
        return;
    }
    
    if (ch.mode === "app") {
        // Build Custom Choice Modal
        const modal = document.createElement('div');
        modal.className = 'choice-modal';
        modal.innerHTML = `
          <div class="choice-card">
            <div style="font-size: 18px; margin-bottom: 10px; color: var(--txt);">SELECT PLAYER</div>
            <div style="font-size: 12px; color: var(--muted); margin-bottom: 5px;">How would you like to watch?</div>
            <div style="font-size: 14px; color: var(--acc); margin-bottom: 20px;">${ch.name}</div>
            <div class="choice-btns">
              <button class="btn-opt btn-app" id="choose-app">NS / VLC</button>
              <button class="btn-opt btn-web" id="choose-web">WEB PAGE</button>
            </div>
          </div>
        `;
        document.body.appendChild(modal);

        // Option 1: App Logic
        document.getElementById('choose-app').onclick = () => {
            modal.remove();
            const isAndroid = /Android/i.test(navigator.userAgent);
            const vlcUrl = `vlc://${ch.url}`;
            if (!isAndroid) {
                window.location.href = vlcUrl;
            } else {
                const intentUrl = `intent:${ch.url}#Intent;package=com.genuine.leone;type=video/*;end`;
                let hasAppOpened = false;
                window.onblur = () => { hasAppOpened = true; };
                window.location.href = intentUrl;
                setTimeout(() => {
                    if (!hasAppOpened) window.location.href = vlcUrl;
                    window.onblur = null;
                }, 1500);
            }
        };

        // Option 2: Web Logic
        document.getElementById('choose-web').onclick = () => {
            modal.remove();
            window.open(ch.url, '_blank');
        };
        return;
    }

    activeChannelIndex = index;
    const clapprWrapper = document.getElementById('clappr-player-container');
    const shakaWrapper = document.getElementById('shaka-container');
    const qualitySelect = document.getElementById('quality-regulator');
    qualitySelect.innerHTML = '<option value="auto">AUTO QUALITY</option>';
    clapprPlayer.pause();
    if (shakaInstance) await shakaInstance.unload();
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    
    if (ch.player === "shaka" || ch.player === "hls") {
      clapprWrapper.style.display = 'none'; shakaWrapper.style.display = 'block';
      if (ch.player === "hls" && Hls.isSupported()) {
          hlsInstance = new Hls({ enableLowLatencyMode: true, initialLiveManifestSize: 1, liveSyncDuration: 2, maxBufferLength: 30, maxMaxBufferLength: 45 });
          hlsInstance.loadSource(ch.url); hlsInstance.attachMedia(shakaVideo); 
          hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
              hlsInstance.levels.forEach((lvl, i) => {
                  const opt = document.createElement('option'); opt.value = i;
                  opt.text = lvl.height + "P (" + (lvl.bitrate / 1000000).toFixed(1) + " Mbps)";
                  qualitySelect.appendChild(opt);
              });
              shakaVideo.play();
          });
      } else {
          let config = { abr: { enabled: true } };
          if (ch.key?.includes(':')) {
            const [kid, key] = ch.key.split(':');
            config.drm = { clearKeys: { [kid.replace(/-/g, '')]: key } };
          }
          shakaInstance.configure(config);
          try {
            await shakaInstance.load(ch.url);
            const tracks = shakaInstance.getVariantTracks().sort((a,b) => b.height - a.height);
            tracks.forEach((track, i) => {
              const opt = document.createElement('option'); opt.value = i;
              opt.text = `${track.height}P (${(track.bandwidth / 1000000).toFixed(1)} Mbps)`;
              qualitySelect.appendChild(opt);
            });
          } catch(e) { console.error(e); }
      }
    } else {
      shakaWrapper.style.display = 'none'; clapprWrapper.style.display = 'block';
      clapprPlayer.load(ch.url); clapprPlayer.play();
    }
    document.getElementById('current-ch-name').innerText = ch.name;
    document.getElementById('current-ch-category').innerText = ch.category;
    renderChannels();
    resetTimer();
  }

  function renderChannels() {
    const list = document.getElementById('channel-list');
    list.innerHTML = "";
    CHANNELS.forEach((ch, index) => {
      if (activeCategory === "All" || ch.category === activeCategory) {
        const row = document.createElement('div');
        const isActive = (index === activeChannelIndex && ch.mode === "web");
        row.className = `ch-row ${isActive ? 'active' : ''}`;
        row.onclick = () => selectChannel(index);
        row.innerHTML = `
          <div class="ch-row-art"><img src="${ch.logo}"></div>
          <div class="ch-info" style="flex-grow:1;">
            <div class="ch-name" style="font-size:14px; margin-bottom: 2px;">${ch.name}</div>
            <div class="ch-tags">
              <span class="tag">${ch.quality || '1080P'}</span>
              <span class="tag">${ch.fps || '60 FPS'}</span>
              <span class="tag">${ch.vpn || 'GLOBAL'}</span>
            </div>
          </div>`;
        list.appendChild(row);
      }
    });
  }

  document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
